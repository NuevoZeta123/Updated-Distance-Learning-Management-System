{% extends "dlms_base_template.html" %}

{% block title %}Bad Request - Distance Learn{% endblock %}

{% block content %}
<div class="container" style="text-align:center;padding:3rem 0;">
    <div class="card" style="max-width:500px;margin:2rem auto;background:var(--bg-danger);border-color:var(--color-danger);">
        <h1 style="color:var(--color-danger);font-size:3rem;margin-bottom:1rem;">400</h1>
        <h2 style="color:var(--color-danger);margin-bottom:1rem;">Bad Request</h2>
        <p style="color:var(--text-secondary);margin-bottom:1.5rem;">
            The request you made was invalid or malformed.
        </p>
        {% if error %}
        <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem;background:rgba(0,0,0,0.1);padding:1rem;border-radius:8px;">
            <strong>Details:</strong> {{ error }}
        </p>
        {% endif %}
        <a href="{{ url_for('index') }}" class="btn btn-primary">Back to Home</a>
    </div>
</div>
{% endblock %}
